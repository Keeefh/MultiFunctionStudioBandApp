<svg width="3659" height="1935" viewBox="0 0 3659 1935" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
/* Base string styles */
#string-1, #string-2, #string-3, #string-4, #string-5, #string-6 {
  stroke: #FFFAEE;
  stroke-width: 2;
  transition: stroke 0.1s ease, stroke-width 0.1s ease, filter 0.1s ease;
}

/* String-specific vibration animations - different speeds for realistic feel */
@keyframes string-vibrate-1 {
  0%, 100% { transform: translateY(0); }
  8% { transform: translateY(-6px); }
  16% { transform: translateY(5px); }
  24% { transform: translateY(-4px); }
  32% { transform: translateY(3px); }
  40% { transform: translateY(-2.5px); }
  50% { transform: translateY(2px); }
  60% { transform: translateY(-1.5px); }
  70% { transform: translateY(1px); }
  80% { transform: translateY(-0.5px); }
  90% { transform: translateY(0.3px); }
}

@keyframes string-vibrate-2 {
  0%, 100% { transform: translateY(0); }
  7% { transform: translateY(-5px); }
  14% { transform: translateY(4.5px); }
  22% { transform: translateY(-3.5px); }
  30% { transform: translateY(3px); }
  40% { transform: translateY(-2px); }
  52% { transform: translateY(1.5px); }
  64% { transform: translateY(-1px); }
  78% { transform: translateY(0.5px); }
}

@keyframes string-vibrate-3 {
  0%, 100% { transform: translateY(0); }
  6% { transform: translateY(-4.5px); }
  13% { transform: translateY(4px); }
  20% { transform: translateY(-3px); }
  28% { transform: translateY(2.5px); }
  38% { transform: translateY(-1.8px); }
  50% { transform: translateY(1.2px); }
  65% { transform: translateY(-0.8px); }
  82% { transform: translateY(0.4px); }
}

@keyframes string-vibrate-4 {
  0%, 100% { transform: translateY(0); }
  5% { transform: translateY(-4px); }
  12% { transform: translateY(3.5px); }
  19% { transform: translateY(-2.8px); }
  27% { transform: translateY(2.2px); }
  37% { transform: translateY(-1.6px); }
  50% { transform: translateY(1px); }
  68% { transform: translateY(-0.6px); }
}

@keyframes string-vibrate-5 {
  0%, 100% { transform: translateY(0); }
  5% { transform: translateY(-3.5px); }
  11% { transform: translateY(3px); }
  18% { transform: translateY(-2.5px); }
  26% { transform: translateY(2px); }
  36% { transform: translateY(-1.4px); }
  50% { transform: translateY(0.9px); }
  70% { transform: translateY(-0.5px); }
}

@keyframes string-vibrate-6 {
  0%, 100% { transform: translateY(0); }
  4% { transform: translateY(-3px); }
  10% { transform: translateY(2.5px); }
  16% { transform: translateY(-2px); }
  24% { transform: translateY(1.6px); }
  34% { transform: translateY(-1.2px); }
  48% { transform: translateY(0.8px); }
  66% { transform: translateY(-0.4px); }
}

/* Vibrating string styles - subtle glow, focused on string only */
#string-1.vibrating {
  animation: string-vibrate-1 0.7s ease-out;
  transform-origin: center;
  stroke: #FF6B9D;
  stroke-width: 3;
  filter: drop-shadow(0 0 3px rgba(255, 107, 157, 0.8));
}

#string-2.vibrating {
  animation: string-vibrate-2 0.65s ease-out;
  transform-origin: center;
  stroke: #FF9F43;
  stroke-width: 3;
  filter: drop-shadow(0 0 3px rgba(255, 159, 67, 0.8));
}

#string-3.vibrating {
  animation: string-vibrate-3 0.6s ease-out;
  transform-origin: center;
  stroke: #FECA57;
  stroke-width: 3;
  filter: drop-shadow(0 0 3px rgba(254, 202, 87, 0.8));
}

#string-4.vibrating {
  animation: string-vibrate-4 0.55s ease-out;
  transform-origin: center;
  stroke: #48DBFB;
  stroke-width: 2.5;
  filter: drop-shadow(0 0 2px rgba(72, 219, 251, 0.8));
}

#string-5.vibrating {
  animation: string-vibrate-5 0.5s ease-out;
  transform-origin: center;
  stroke: #A55EEA;
  stroke-width: 2.5;
  filter: drop-shadow(0 0 2px rgba(165, 94, 234, 0.8));
}

#string-6.vibrating {
  animation: string-vibrate-6 0.45s ease-out;
  transform-origin: center;
  stroke: #26DE81;
  stroke-width: 2;
  filter: drop-shadow(0 0 2px rgba(38, 222, 129, 0.8));
}
</style>
